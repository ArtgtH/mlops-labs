name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  POETRY_VERSION: "2.2.1"
  POETRY_VIRTUALENVS_CREATE: "false"
  PYTHONPATH: ${{ github.workspace }}/app/src

jobs:
  lint-and-tests:
    name: Lint and tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Poetry
        run: python -m pip install "poetry==$POETRY_VERSION"

      - name: Cache Poetry packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('app/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        working-directory: app
        run: poetry install --only main,test --no-root

      - name: Flake8
        working-directory: app
        run: poetry run flake8 .

      - name: Ruff
        working-directory: app
        run: poetry run ruff check .

      - name: Pytest with coverage
        working-directory: app
        run: poetry run pytest --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-python-${{ matrix.python-version }}
          path: |
            app/coverage.xml
            app/.coverage

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Poetry
        run: python -m pip install "poetry==$POETRY_VERSION"

      - name: Install dependencies
        working-directory: app
        run: poetry install --only main,test --no-root

      - name: Pip audit
        working-directory: app
        run: poetry run pip-audit

  dvc-pipeline:
    name: DVC pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Poetry
        run: python -m pip install "poetry==$POETRY_VERSION"

      - name: Cache Poetry packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-pipeline-${{ runner.os }}-${{ hashFiles('app/poetry.lock') }}
          restore-keys: |
            poetry-pipeline-${{ runner.os }}-

      - name: Install pipeline dependencies
        working-directory: app
        run: poetry install --only main,pipeline --no-root

      - name: Reproduce DVC pipeline
        run: |
          dvc pull || true
          MLFLOW_TRACKING_URI=file:mlruns dvc repro
          dvc status

      - name: Upload pipeline artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dvc-pipeline-artifacts
          path: |
            dvc.lock
            reports/
            models/model.pkl
            models/feature_columns.json
            models/logreg.pkl
            models/random_forest.pkl
            mlruns/
