stages:
  load_data:
    cmd: python scripts/load_data.py --url ${data.url} --output data/raw/creditcard.arff
    deps:
      - scripts/load_data.py
    params:
      - data.url
    outs:
      - data/raw/creditcard.arff

  preprocess:
    cmd: python scripts/preprocess.py --input data/raw/creditcard.arff --train-output data/processed/train.csv --test-output data/processed/test.csv --params params.yaml
    deps:
      - data/raw/creditcard.arff
      - scripts/preprocess.py
    params:
      - split.test_size
      - split.random_state
      - split.stratify
    outs:
      - data/processed/train.csv
      - data/processed/test.csv

  validate_data:
    cmd: python scripts/validate_data.py --train data/processed/train.csv --test data/processed/test.csv --output reports/gx_validation.json
    deps:
      - data/processed/train.csv
      - data/processed/test.csv
      - scripts/validate_data.py
    outs:
      - reports/gx_validation.json:
          cache: false

  train:
    cmd: python scripts/train.py --train data/processed/train.csv --test data/processed/test.csv --params params.yaml --models-dir models --metrics-output reports/metrics.json
    deps:
      - data/processed/train.csv
      - data/processed/test.csv
      - reports/gx_validation.json
      - scripts/train.py
    params:
      - train.random_seed
      - train.experiment_name
      - logreg.max_iter
      - logreg.C
      - random_forest.n_estimators
      - random_forest.max_depth
    outs:
      - models/logreg.pkl
      - models/random_forest.pkl
      - models/model.pkl
      - models/feature_columns.json:
          cache: false
    metrics:
      - reports/metrics.json:
          cache: false
